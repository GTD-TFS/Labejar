<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Glass Lab Soft Optics</title>
  <style>
    :root{
      --bgA:#090d16;
      --bgB:#111a2a;
      --fg:#f1f6ff;
      --muted:#9baec8;
      --glass:rgba(255,255,255,.05);
      --stroke:rgba(220,235,255,.14);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"SF Pro Display","Segoe UI",system-ui,sans-serif;
      color:var(--fg);
      background:
        radial-gradient(90vmax 70vmax at 86% 18%, rgba(89,196,255,.18), transparent 64%),
        radial-gradient(80vmax 60vmax at 12% 88%, rgba(168,107,255,.16), transparent 66%),
        linear-gradient(180deg,var(--bgA),var(--bgB));
    }
    .wrap{max-width:940px;margin:0 auto;min-height:100dvh;padding:22px;display:grid;grid-template-rows:auto auto 1fr auto;gap:18px}

    .surface{
      position:relative;
      border-radius:34px;
      background:var(--glass);
      border:1px solid var(--stroke);
      backdrop-filter: blur(24px) saturate(125%);
      -webkit-backdrop-filter: blur(24px) saturate(125%);
      box-shadow:
        0 18px 40px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.09),
        inset 0 -20px 36px rgba(57,124,255,.06);
      overflow:hidden;
    }

    /* no hard highlight bands, only broad soft area lights */
    .surface::before,
    .surface::after{content:"";position:absolute;pointer-events:none;filter:blur(26px)}
    .surface::before{
      width:68%;height:56%;left:-8%;top:-18%;
      background:radial-gradient(closest-side, rgba(255,255,255,.24), rgba(255,255,255,.08) 45%, transparent 80%);
      transform:rotate(-8deg);
    }
    .surface::after{
      width:64%;height:64%;right:-14%;bottom:-28%;
      background:radial-gradient(closest-side, rgba(82,196,255,.28), rgba(182,104,255,.20) 45%, transparent 78%);
      mix-blend-mode:screen;
      opacity:.62;
    }

    .top{height:112px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
    .title{text-align:center;font-size:clamp(40px,8vw,70px);font-weight:800;letter-spacing:1px;text-shadow:0 10px 28px rgba(0,0,0,.5)}

    .btn{
      position:relative;
      width:70px;height:70px;border:0;border-radius:999px;color:#f8fbff;font-size:33px;
      background:rgba(255,255,255,.05);
      box-shadow:
        0 10px 24px rgba(0,0,0,.48),
        inset 0 1px 0 rgba(255,255,255,.12),
        inset 0 -10px 20px rgba(74,152,255,.10);
      backdrop-filter: blur(24px) saturate(130%);
      -webkit-backdrop-filter: blur(24px) saturate(130%);
    }
    .btn::before{
      content:"";position:absolute;inset:-18%;border-radius:999px;pointer-events:none;filter:blur(18px);
      background:radial-gradient(closest-side, rgba(255,255,255,.15), transparent 72%);
    }

    .panel{padding:18px;min-height:320px;display:grid;gap:12px}
    .chip{display:flex;gap:12px;align-items:center;padding:14px;border-radius:22px;background:rgba(255,255,255,.03);border:1px solid rgba(220,235,255,.12)}
    .thumb{width:84px;height:64px;border-radius:12px;background:rgba(255,255,255,.06)}
    .meta{flex:1}
    .meta b{display:block;font-size:23px}
    .meta small{display:block;color:var(--muted)}

    .dock{height:158px;padding:16px 22px;display:flex;justify-content:space-between;align-items:center}
    .send{
      width:min(320px,42vw);height:96px;border-radius:48px;border:0;color:#f7fbff;font-size:48px;
      background:rgba(255,255,255,.07);
      backdrop-filter:blur(28px) saturate(140%);
      -webkit-backdrop-filter:blur(28px) saturate(140%);
      box-shadow:
        0 16px 30px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.14),
        inset 0 -16px 26px rgba(92,199,255,.14);
      position:relative;
    }
    .send::before{
      content:"";position:absolute;inset:-18% -10%;border-radius:60px;pointer-events:none;filter:blur(22px);
      background:radial-gradient(closest-side, rgba(92,199,255,.25), rgba(178,107,255,.18) 55%, transparent 78%);
    }

    .hint{margin:0;text-align:center;color:#8ea2bc;font-size:14px}
    @media (max-width:680px){.btn{width:62px;height:62px;font-size:29px}.send{height:88px;font-size:42px}.title{font-size:54px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="surface top">
      <button class="btn" aria-label="capturar">◎</button>
      <button class="btn" aria-label="añadir">＋</button>
      <button class="btn" aria-label="menu">≡</button>
    </section>

    <h1 class="title">COMPA·POL</h1>

    <section class="surface panel">
      <article class="chip"><div class="thumb"></div><div class="meta"><b>Filiación 1</b><small>Javier Bejar · Pasaporte · Legal</small></div><button class="btn" style="width:52px;height:52px;font-size:24px">↗</button></article>
      <article class="chip"><div class="thumb"></div><div class="meta"><b>Añadir filiación</b><small>Acceso rápido</small></div><button class="btn" style="width:52px;height:52px;font-size:24px">＋</button></article>
    </section>

    <section class="surface dock">
      <button class="btn" aria-label="exportar">↓</button>
      <button class="send" aria-label="enviar">☁</button>
      <button class="btn" aria-label="reset">⟳</button>
    </section>

    <p class="hint">Versión soft optics: reflejo difuso, sin bordes definidos en el brillo.</p>
  </main>
</body>
</html>
